[package]
license = "MIT"
description = "slack9 is a template for my Rust projects to make it easier to start new ones."
repository = "https://github.com/anttiharju/slack9"
readme = "docs/README.md"
name = "slack9"
version = "0.4.7"
edition = "2024"
include = ["src/**", "tests/**"]

[dependencies]
anstyle = "1.0"
clap = { version = "4.6", features = ["cargo", "derive"] }
crossterm = "0.29"
indexmap = { version = "2", features = ["serde"] }
ratatui = "0.30"
ureq = { version = "3.2", features = ["json"] }
jiff = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "1.0"

[dev-dependencies]
assert_cmd = "2.2"
