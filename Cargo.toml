[package]
license = "MIT"
description = "slack9 is a template for my Rust projects to make it easier to start new ones."
repository = "https://github.com/anttiharju/slack9"
readme = "docs/README.md"
name = "slack9"
version = "0.0.0"
edition = "2024"
include = ["src/**", "tests/**"]

[dependencies]
anstyle = "1.0.13"
clap = { version = "4.5.57", features = ["cargo", "derive"] }
crossterm = "0.28"
indexmap = { version = "2", features = ["serde"] }
ratatui = "0.29"
reqwest = { version = "0.12", default-features = false, features = [
    "blocking",
    "json",
    "rustls-tls",
] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

[dev-dependencies]
assert_cmd = "2.1.2"
