[package]
license = "MIT"
description = "slackemon is a template for my Rust projects to make it easier to start new ones."
repository = "https://github.com/anttiharju/slackemon"
readme = "docs/README.md"
name = "slackemon"
version = "0.0.0"
edition = "2024"
include = [
    "src/**",
    "tests/**",
]

[dependencies]
anstyle = "1.0.13"
clap = { version = "4.5.57", features = ["cargo", "derive"] }
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
assert_cmd = "2.1.2"
