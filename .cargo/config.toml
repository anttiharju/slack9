# cargo build --all-features --target aarch64-apple-darwin
[target.aarch64-apple-darwin]
linker = ".cargo/zcc/aarch64-apple-darwin.sh"

# cargo build --all-features --target aarch64-unknown-linux-musl
[target.aarch64-unknown-linux-musl]
linker = ".cargo/zcc/aarch64-unknown-linux-musl.sh"
rustflags = ["-Clink-self-contained=no"]

# cargo build --all-features --target x86_64-unknown-linux-musl
[target.x86_64-unknown-linux-musl]
linker = ".cargo/zcc/x86_64-unknown-linux-musl.sh"
rustflags = ["-Clink-self-contained=no"]
