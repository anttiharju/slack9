name: Plan
permissions: {}
on:
  pull_request:
  workflow_call:
    outputs:
      version:
        description: "Version for the next release. Empty if no release is needed."
        value: ${{ jobs.validate.outputs.version || '' }}
      documentation:
        description: "Whether to update the documentation website"
        value: ${{ jobs.validate.outputs.documentation_changed == 'true' }}
      container:
        description: "Image in which all CI jobs should be ran"
        value: ${{ jobs.container.outputs.image }}

jobs:
  container:
    if: "!endsWith(github.event.repository.name, '-starter')"
    name: Container
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - name: Find changes
        id: changes
        uses: anttiharju/find-changes-action@v2
      - name: Compare changes
        id: flake
        uses: anttiharju/compare-changes-action@v0.7.39
        with:
          github-workflows-wildcard: flake.yml
          changes: ${{ steps.changes.outputs.array }}
      - if: steps.flake.outputs.changed == 'true'
        name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-25.05
          extra_nix_config: |
            trusted-substituters = https://cache.nixos.org https://nix-community.cachix.org https://anttiharju.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= anttiharju.cachix.org-1:1/w1vNdGsG6EynEoWhjJLJ2rxqde2BP+wkKM+YdOxMQ=
            accept-flake-config = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - if: steps.flake.outputs.changed == 'true'
        run: |
          nix build .#ci
      - if: steps.flake.outputs.changed == 'true'
        name: Output image information
        id: container
        env:
          owner: ${{ github.repository_owner }}
          repository: ${{ github.event.repository.name }}
        run: |
          nix_hash="$(basename "$(readlink ./result)" | cut -d '-' -f1)"
          echo "nix_hash=$nix_hash"
          echo "nix_hash=$nix_hash" >> "$GITHUB_OUTPUT"

          image_id="ghcr.io/$owner/$repository-ci"
          image_id="$(echo "$image_id" | tr '[:upper:]' '[:lower:]')"
          echo "image_id=$image_id"
          echo "image_id=$image_id" >> "$GITHUB_OUTPUT"

          image="$image_id:$nix_hash"
          echo "image=$image"
          echo "image=$image" >> "$GITHUB_OUTPUT"
      - if: steps.flake.outputs.changed == 'true'
        name: Log in to registry
        env:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          actor: ${{ github.actor }}
        run: |
          echo "$github_token" | docker login ghcr.io -u "$actor" --password-stdin
      - if: steps.flake.outputs.changed == 'true'
        name: Check registry
        id: image
        env:
          image: ${{ steps.container.outputs.image }}
        run: |
          if docker manifest inspect "$image" > /dev/null 2>&1; then
            echo "pushed=true"
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.flake.outputs.changed == 'true' && steps.image.outputs.pushed != 'true'
        run: |
          ./result | docker load
      - if: steps.flake.outputs.changed == 'true' && steps.image.outputs.pushed != 'true'
        name: Tag image
        env:
          image: ${{ steps.container.outputs.image }}
        run: |
          docker tag ci:flake "$image"
      - if: steps.flake.outputs.changed == 'true' && steps.image.outputs.pushed != 'true'
        name: Push image
        env:
          image: ${{ steps.container.outputs.image }}
        run: |
          docker push "$image"
      - if: steps.flake.outputs.changed == 'true' && github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        name: Tag as latest
        env:
          image_id: ${{ steps.container.outputs.image_id }}
          image: ${{ steps.container.outputs.image }}
        run: |
          skopeo copy --all "docker://$image" "docker://$image_id:latest"
      - if: steps.flake.outputs.changed == 'true' && github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        name: Delete previous versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}-ci
          package-type: container
          min-versions-to-keep: 1
          delete-only-untagged-versions: false
    outputs:
      image: ${{ steps.container.outputs.image || format('ghcr.io/{0}/{1}-ci:latest', github.repository_owner, github.event.repository.name) }}

  validate:
    name: Validate
    needs: container
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    container:
      image: ${{ needs.container.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ github.token }}
    steps:
      - name: Find changes
        id: changes
        uses: anttiharju/find-changes-action@v2

      - name: Detect changes
        id: changed
        uses: ./.github/actions/detect-changes
        with:
          changes: ${{ steps.changes.outputs.array }}

      - if: steps.changed.outputs.rust == 'true' || steps.changed.outputs.release == 'true' || github.event_name == 'push'
        id: version
        name: Detect version from Cargo.toml
        env:
          GH_TOKEN: ${{ github.token }}
          event_name: ${{ github.event_name }}
        run: |
          cargo_version="v$(toml get Cargo.toml package.version --raw)"
          echo "cargo_version=$cargo_version"
          latest_tag=$(gh api "repos/{owner}/{repo}/releases/latest" --jq '.tag_name' || echo "")
          echo "latest_tag=$latest_tag"
          if [[ "$cargo_version" == "$latest_tag" ]]; then
            if [[ "$event_name" == "push" ]]; then
              echo "Cargo.toml version ($cargo_version) matches latest release. No release needed."
              exit 0
            fi
            echo "::error::Cargo.toml version ($cargo_version) was not bumped even though files determined by rust and release wildcards have changed."
            exit 1
          fi
          echo "cargo=${cargo_version#v}" >> "$GITHUB_OUTPUT"

          cargo_major="${cargo_version%%.*}"
          latest_major="${latest_tag%%.*}"
          if [[ "$cargo_major" != "$latest_major" ]]; then
            echo "major=true" >> "$GITHUB_OUTPUT"
          fi

      - if: always() && !cancelled() && (steps.changed.outputs.rust == 'true' || github.event_name == 'push')
        name: Cache
        uses: ./.github/actions/cache

      - if: always() && !cancelled() && (steps.changed.outputs.rust == 'true' || github.event_name == 'push')
        run: cargo build --locked --all-features --target aarch64-apple-darwin
      - if: always() && !cancelled() && (steps.changed.outputs.rust == 'true' || github.event_name == 'push')
        run: cargo build --locked --all-features --target aarch64-unknown-linux-musl
      - if: always() && !cancelled() && (steps.changed.outputs.rust == 'true' || github.event_name == 'push')
        run: cargo build --locked --all-features --target x86_64-unknown-linux-musl

      - if: always() && !cancelled() && (steps.changed.outputs.rust == 'true' || github.event_name == 'push')
        run: cargo test --all-features

      - if: always() && !cancelled() && (steps.changed.outputs.rs == 'true' || github.event_name == 'push')
        run: cargo fmt --check

      - if: always() && !cancelled() && (steps.changed.outputs.rs == 'true' || github.event_name == 'push')
        run: cargo clippy -- --deny warnings

      - if: always() && !cancelled()
        name: relcheck
        run: |
          relcheck all --verbose --color=always

      - if: always() && !cancelled()
        name: action-validator
        run: |
          git ls-files -z ".github/*/*.yml" "*/action.yml" | xargs --null action-validator --verbose

      - if: always() && !cancelled() && (steps.changed.outputs.actionlint == 'true' || github.event_name == 'push')
        name: actionlint
        run: |
          actionlint -color

      - if: always() && !cancelled()
        name: EditorConfig-Checker
        run: |
          git ls-files -z | xargs --null editorconfig-checker

      - if: always() && !cancelled()
        name: Keep .yml
        run: |
          YAML_FILES=$(git ls-files -z '*.yaml')
          if [ -n "$YAML_FILES" ]; then
            echo "Found the following .yaml files. Please use .yml extension instead."
            echo "$YAML_FILES" | tr '\0' '\n'
            exit 1
          fi
          echo "No .yaml files found. Good job!"

      - if: always() && !cancelled() && (steps.changed.outputs.zensical == 'true' || github.event_name == 'push')
        name: zensical
        run: zensical build

      - if: always() && !cancelled() && (steps.changed.outputs.prettier == 'true' || github.event_name == 'push')
        name: prettier
        run: |
          prettier "{*.yml,*.md}" --check

      - if: always() && !cancelled() && (steps.changed.outputs.brew == 'true' || github.event_name == 'push')
        name: Rubocop formula
        uses: ./.github/actions/rubocop-formula

      - if: always() && !cancelled() && (steps.changed.outputs.shellcheck == 'true' || github.event_name == 'push')
        name: shellcheck
        run: |
          git ls-files -z '*.sh' | xargs --null shellcheck --color=always

      - if: always() && !cancelled() && (steps.changed.outputs.zizmor == 'true' || github.event_name == 'push')
        name: zizmor
        run: |
          zizmor .
    outputs:
      version: ${{ steps.version.outputs.cargo }}
      documentation_changed: ${{ steps.changed.outputs.zensical }}
