name: "Detect changes"
description: "Decide what steps need running based on changes"
inputs:
  changes:
    description: "JSON array of changed files"
    required: true
runs:
  using: "composite"
  steps:
    - id: actionlint
      shell: sh
      env:
        array: ${{ inputs.changes }}
      run: |
        compare-changes --changes "$array" --wildcard actionlint.yml
    - id: prettier
      shell: sh
      env:
        array: ${{ inputs.changes }}
      run: |
        compare-changes --changes "$array" --wildcard prettier.yml
    - id: brew
      shell: sh
      env:
        array: ${{ inputs.changes }}
      run: |
        compare-changes --changes "$array" --wildcard release-brew.yml
    # flake.yml is only used in the plan.yml container job
    - id: github
      shell: sh
      env:
        array: ${{ inputs.changes }}
      run: |
        compare-changes --changes "$array" --wildcard release-github.yml
    - id: nix
      shell: sh
      env:
        array: ${{ inputs.changes }}
      run: |
        compare-changes --changes "$array" --wildcard release-nix.yml
    - id: rs
      shell: sh
      env:
        array: ${{ inputs.changes }}
      run: |
        compare-changes --changes "$array" --wildcard rs.yml
    - id: rust
      shell: sh
      env:
        array: ${{ inputs.changes }}
      run: |
        compare-changes --changes "$array" --wildcard rust.yml
    - id: shellcheck
      shell: sh
      env:
        array: ${{ inputs.changes }}
      run: |
        compare-changes --changes "$array" --wildcard shellcheck.yml
    - id: src
      shell: sh
      env:
        array: ${{ inputs.changes }}
      run: |
        compare-changes --changes "$array" --wildcard src.yml
    - id: zensical
      shell: sh
      env:
        array: ${{ inputs.changes }}
      run: |
        compare-changes --changes "$array" --wildcard zensical.yml
    - id: zizmor
      shell: sh
      env:
        array: ${{ inputs.changes }}
      run: |
        compare-changes --changes "$array" --wildcard zizmor.yml
outputs:
  actionlint:
    description: "Whether actionlint has changed"
    value: ${{ steps.actionlint.outputs.changed }}
  # flake.yml is only used in the plan.yml container job
  prettier:
    description: "Whether Prettier has changed"
    value: ${{ steps.prettier.outputs.changed }}
  brew:
    description: "Whether Brew has changed"
    value: ${{ steps.brew.outputs.changed }}
  github:
    description: "Whether GitHub has changed"
    value: ${{ steps.github.outputs.changed }}
  nix:
    description: "Whether Nix has changed"
    value: ${{ steps.nix.outputs.changed }}
  rs:
    description: "Whether *.rs has changed"
    value: ${{ steps.rs.outputs.changed }}
  rust:
    description: "Whether Rust has changed"
    value: ${{ steps.rust.outputs.changed }}
  shellcheck:
    description: "Whether ShellCheck has changed"
    value: ${{ steps.shellcheck.outputs.changed }}
  src:
    description: "Whether src has changed"
    value: ${{ steps.src.outputs.changed }}
  zensical:
    description: "Whether Zensical has changed"
    value: ${{ steps.zensical.outputs.changed }}
  zizmor:
    description: "Whether Zizmor has changed"
    value: ${{ steps.zizmor.outputs.changed }}

  release:
    description: "Whether any release has changed"
    value: ${{ steps.brew.outputs.changed || steps.github.outputs.changed || steps.nix.outputs.changed }}
