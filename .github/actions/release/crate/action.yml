name: "Release crate to crates.io"
description: "Publish the Rust crate to crates.io"
inputs:
  cargo_registry_token:
    description: "Cargo registry token (crates.io) with publish-update scopes"
    required: true
runs:
  using: "composite"
  steps:
    - name: Publish to crates.io
      shell: sh
      env:
        CARGO_REGISTRY_TOKEN: ${{ inputs.cargo_registry_token }}
      run: |
        cargo publish --no-verify --all-features
